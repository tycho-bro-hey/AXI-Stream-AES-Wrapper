<line x1="410" y1="236" x2="495" y2="300" class="arr" marker-end="url(#arrow)" stroke-width="0.5"/>
<line x1="455" y1="356" x2="455" y2="480" class="arr" marker-end="url(#arrow)" stroke-width="0.5"/>
<line x1="190" y1="248" x2="190" y2="480" class="arr" marker-end="url(#arrow)" stroke-width="0.5"/>
<text class="ts" x="198" y="420" text-anchor="start" dominant-baseline="central">tag == parsed tag?</text>
</svg>
