<path d="M620 164 L620 380 L410 380 L410 248" fill="none" stroke="var(--t)" stroke-width="0.5" stroke-dasharray="3 3" marker-end="url(#arrow)"/>
<text class="ts" x="628" y="280" text-anchor="start" dominant-baseline="central" transform="rotate(90,628,280)">tag (late)</text>
<line x1="520" y1="228" x2="520" y2="244" class="arr" marker-end="url(#arrow)" stroke-width="0.5"/>
<line x1="440" y1="262" x2="410" y2="236" class="arr" marker-end="url(#arrow)" stroke-width="0.5"/>
<path d="M393 175 L320 175 L320 204" fill="none" class="arr" stroke-width="0.5"/>
<line x1="170" y1="248" x2="155" y2="300" class="arr" marker-end="url(#arrow)" stroke-width="0.5"/>
