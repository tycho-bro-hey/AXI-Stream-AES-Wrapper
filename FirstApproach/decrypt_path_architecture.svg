  <text class="ts" x="512" y="43" text-anchor="middle" dominant-baseline="central">8-bit: IV + CT + Tag</text>
</g>
<rect x="25" y="68" width="630" height="390" rx="16" fill="none" stroke="var(--s)" stroke-width="1"/>
<text class="th" x="340" y="86" text-anchor="middle" dominant-baseline="central">gcm_axi_decrypt</text>
<line x1="110" y1="51" x2="110" y2="108" class="arr" marker-end="url(#arrow)" stroke-width="0.5"/>
<line x1="285" y1="51" x2="285" y2="204" class="arr" marker-end="url(#arrow)" stroke-width="0.5"/>
<line x1="512" y1="51" x2="512" y2="108" class="arr" marker-end="url(#arrow)" stroke-width="0.5"/>
