  <text class="th" x="512" y="124" text-anchor="middle" dominant-baseline="central">gcm_rx_parser</text>
  <text class="ts" x="512" y="144" text-anchor="middle" dominant-baseline="central">Separates IV, CT bytes, tag</text>
</g>
<text class="ts" x="393" y="180" text-anchor="start" dominant-baseline="central">IV (96b)</text>
<text class="ts" x="500" y="180" text-anchor="start" dominant-baseline="central">CT bytes</text>
<text class="ts" x="600" y="180" text-anchor="start" dominant-baseline="central">Tag (128b)</text>
