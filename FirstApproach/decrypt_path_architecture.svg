  <rect x="440" y="192" width="160" height="36" rx="8" stroke-width="0.5"/>
  <text class="th" x="520" y="210" text-anchor="middle" dominant-baseline="central">Width converter</text>
</g>
<g class="c-purple">
  <rect x="440" y="244" width="160" height="36" rx="8" stroke-width="0.5"/>
  <text class="th" x="520" y="262" text-anchor="middle" dominant-baseline="central">gcm_rx_shim</text>
</g>
<g class="c-coral">
