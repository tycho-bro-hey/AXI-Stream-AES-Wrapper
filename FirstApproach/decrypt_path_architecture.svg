  <text class="ts" x="185" y="340" text-anchor="middle" dominant-baseline="central">Decrypt mode (mode=1)</text>
</g>
<g class="c-purple">
  <rect x="370" y="300" width="250" height="56" rx="8" stroke-width="0.5"/>
