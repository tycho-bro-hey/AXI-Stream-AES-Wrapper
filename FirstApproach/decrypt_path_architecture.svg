  <text class="ts" x="190" y="512" text-anchor="middle" dominant-baseline="central">authOk / authFail</text>
</g>
<path d="M40 130 L33 130 L33 325 L60 325" fill="none" class="arr" marker-end="url(#arrow)" stroke-width="0.5"/>
<text class="ts" x="37" y="240" text-anchor="start" dominant-baseline="central" transform="rotate(-90,37,240)">key</text>
<path d="M405 164 L405 204" fill="none" class="arr" marker-end="url(#arrow)" stroke-width="0.5"/>
