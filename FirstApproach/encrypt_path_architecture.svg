<svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<g class="c-gray">
  <rect x="40" y="15" width="140" height="36" rx="6" stroke-width="0.5"/>
  <text class="th" x="110" y="27" text-anchor="middle" dominant-baseline="central">Key AXI-S</text>
  <text class="ts" x="110" y="43" text-anchor="middle" dominant-baseline="central">32B, MSB-first</text>
</g>
<g class="c-gray">
  <rect x="195" y="15" width="120" height="36" rx="6" stroke-width="0.5"/>
  <text class="th" x="255" y="27" text-anchor="middle" dominant-baseline="central">IV AXI-S</text>
  <text class="ts" x="255" y="43" text-anchor="middle" dominant-baseline="central">12B, MSB-first</text>
</g>
<g class="c-gray">
  <rect x="345" y="15" width="120" height="36" rx="6" stroke-width="0.5"/>
  <text class="th" x="405" y="27" text-anchor="middle" dominant-baseline="central">RX header</text>
  <text class="ts" x="405" y="43" text-anchor="middle" dominant-baseline="central">payload_len</text>
</g>
<g class="c-gray">
  <rect x="490" y="15" width="150" height="36" rx="6" stroke-width="0.5"/>
  <text class="th" x="565" y="27" text-anchor="middle" dominant-baseline="central">RX payload</text>
  <text class="ts" x="565" y="43" text-anchor="middle" dominant-baseline="central">8-bit cleartext</text>
</g>
<rect x="25" y="68" width="630" height="370" rx="16" fill="none" stroke="var(--s)" stroke-width="1"/>
<text class="th" x="340" y="86" text-anchor="middle" dominant-baseline="central">gcm_axi_top</text>
<line x1="110" y1="51" x2="120" y2="112" class="arr" marker-end="url(#arrow)" stroke-width="0.5"/>
<line x1="255" y1="51" x2="200" y2="112" class="arr" marker-end="url(#arrow)" stroke-width="0.5"/>
<line x1="405" y1="51" x2="340" y2="195" class="arr" marker-end="url(#arrow)" stroke-width="0.5"/>
<line x1="565" y1="51" x2="565" y2="112" class="arr" marker-end="url(#arrow)" stroke-width="0.5"/>
<g class="c-purple">
  <rect x="45" y="112" width="220" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="155" y="128" text-anchor="middle" dominant-baseline="central">gcm_axi_config</text>
  <text class="ts" x="155" y="146" text-anchor="middle" dominant-baseline="central">Key/IV regs, auto-increment</text>
</g>
<g class="c-amber">
  <rect x="470" y="112" width="180" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="560" y="128" text-anchor="middle" dominant-baseline="central">Width converter</text>
  <text class="ts" x="560" y="146" text-anchor="middle" dominant-baseline="central">Vivado IP (8→128 bit)</text>
</g>
<g class="c-purple">
  <rect x="470" y="182" width="180" height="36" rx="8" stroke-width="0.5"/>
  <text class="th" x="560" y="200" text-anchor="middle" dominant-baseline="central">gcm_rx_shim</text>
</g>
<g class="c-purple">
  <rect x="120" y="195" width="320" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="280" y="211" text-anchor="middle" dominant-baseline="central">gcm_axi_encrypt</text>
  <text class="ts" x="280" y="229" text-anchor="middle" dominant-baseline="central">Sequencing FSM</text>
</g>
<g class="c-teal">
  <rect x="80" y="285" width="250" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="205" y="305" text-anchor="middle" dominant-baseline="central">aes_gcm_256</text>
  <text class="ts" x="205" y="325" text-anchor="middle" dominant-baseline="central">AES-256 + GHASH + GCM FSM</text>
</g>
<g class="c-purple">
  <rect x="385" y="285" width="240" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="505" y="305" text-anchor="middle" dominant-baseline="central">gcm_tx_serializer</text>
  <text class="ts" x="505" y="325" text-anchor="middle" dominant-baseline="central">IV + CT + Tag → bytes</text>
</g>
<g class="c-gray">
  <rect x="385" y="460" width="240" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="505" y="476" text-anchor="middle" dominant-baseline="central">TX payload</text>
  <text class="ts" x="505" y="492" text-anchor="middle" dominant-baseline="central">8-bit: IV + CT + Tag</text>
</g>
<path d="M45 134 L38 134 L38 310 L80 310" fill="none" class="arr" marker-end="url(#arrow)" stroke-width="0.5"/>
<text class="ts" x="42" y="230" text-anchor="start" dominant-baseline="central" transform="rotate(-90,42,230)">key, iv</text>
<line x1="560" y1="156" x2="560" y2="182" class="arr" marker-end="url(#arrow)" stroke-width="0.5"/>
<line x1="470" y1="200" x2="440" y2="217" class="arr" marker-end="url(#arrow)" stroke-width="0.5"/>
<text class="ts" x="468" y="218" text-anchor="start" dominant-baseline="central">128b blocks</text>
<line x1="200" y1="239" x2="180" y2="285" class="arr" marker-end="url(#arrow)" stroke-width="0.5"/>
<text class="ts" x="137" y="262" text-anchor="start" dominant-baseline="central">start, pt_in</text>
<line x1="230" y1="285" x2="250" y2="239" class="arr" marker-end="url(#arrow)" stroke-width="0.5"/>
<text class="ts" x="255" y="262" text-anchor="start" dominant-baseline="central">ct_out, done</text>
<line x1="440" y1="227" x2="505" y2="285" class="arr" marker-end="url(#arrow)" stroke-width="0.5"/>
<text class="ts" x="460" y="256" text-anchor="start" dominant-baseline="central">CT, tag</text>
<line x1="505" y1="341" x2="505" y2="460" class="arr" marker-end="url(#arrow)" stroke-width="0.5"/>
<text class="ts" x="513" y="400" text-anchor="start" dominant-baseline="central">byte stream</text>
<path d="M155 156 L155 195" fill="none" stroke="var(--t)" stroke-width="0.5" stroke-dasharray="3 3" marker-end="url(#arrow)"/>
</svg>
